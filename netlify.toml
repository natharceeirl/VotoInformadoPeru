[build]
  publish = "build/web"
  command = "flutter build web --release"

# Disable Netlify post-processing so it doesn't inject webpage_content_reporter.js
# (that script uses ES module 'export' syntax which breaks Flutter web's rendering loop)
[build.processing]
  skip_processing = true

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[context.production.environment]
  NODE_VERSION = "18"

# Security headers for the Flutter web app
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache aggressively for Flutter app assets
[[headers]]
  for = "/flutter_bootstrap.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
